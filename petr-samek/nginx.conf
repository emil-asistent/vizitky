server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on; gzip_vary on; gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Kod (CSS/JS) — vzdy revalidovat pres ETag, at se zmeny projevi hned
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
    # Media a fonty — dlouha immutable cache (meni se zridka)
    location ~* \.(jpg|jpeg|png|gif|webp|svg|woff|woff2|ttf|ico|mp4)$ {
        expires 30d; add_header Cache-Control "public, immutable"; try_files $uri =404;
    }
    # HTML — vzdy revalidovat
    location / {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }
}
