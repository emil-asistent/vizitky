server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on; gzip_vary on; gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    location ~* \.(jpg|jpeg|png|gif|webp|svg|css|js|woff|woff2|ttf|ico|mp4)$ {
        expires 30d; add_header Cache-Control "public, immutable"; try_files $uri =404;
    }
    location / { try_files $uri $uri.html $uri/index.html $uri/ =404; }
    add_header X-Content-Type-Options "nosniff" always;
}