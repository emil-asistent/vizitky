  - generic [ref=e136]:
    - img "Tomáš Vašíček — finanční poradce" [ref=e138]
    - generic [ref=e139]:
      - paragraph [ref=e140]: O mně
      - heading "Tomáš Vašíček, DiS., PFP" [level=2] [ref=e141]
      - paragraph [ref=e142]: Ve financích se pohybuju už přes 20 let. Od začátku to pro mě bylo o jediném – pomoct lidem najít cestu, která dává smysl. V roce 2012 jsem s nejlepším kamarádem Money2u, firmu, která dnes pomáhá klientům po celé republice a čítá více než 200 poradců. Moje hlavní doména? Hypotéky, investice, pojištění – prostě komplexní poradenství, které dává hlavu a patu.
      - paragraph [ref=e143]: Mám za sebou víc než tisíc klientů a pro každého hledám to nejlepší řešení na míru. Žádné šablony, žádné „nejde". Co slíbím, to platí – a co udělám, má přinést výsledek. Chci, aby každý klient cítil, že se může spolehnout.
      - paragraph [ref=e144]:
        - text: Působím hlavně v Brně a okolí, ale klienty mám napříč celou Českou republikou. Kromě financí se věnuju i realitám – jako jednatel ve společnosti Reality2U, i menším developerským projektům. A když zrovna neřeším čísla? Se svou ženou jsme vytvořili
        - strong [ref=e145]: jurtové centrum Marcipán
        - text: v srdci vinic Jižní Moravy. Místo, kde si lidé přijdou odpočinout, zpomalit, nebo zažít něco výjimečného.
      - generic [ref=e146]:
